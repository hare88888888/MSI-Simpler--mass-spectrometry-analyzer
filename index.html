<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mass Spectrometry Imaging Analysis System</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <header>
            <h1>Mass Spectrometry Imaging Analysis System</h1>
        </header>

        <main>
            <!-- 左侧控制面板 -->
            <div class="control-panel">
                <!-- Data Import -->
                <section class="section">
                    <h2>Data Import</h2>
                    <div class="upload-area">
                        <input type="file" id="image-upload" accept=".tif,.tiff,.png,.jpg,.jpeg,.gif,.bmp" multiple>
                        <label for="image-upload" class="upload-btn">
                            <span class="icon">📁</span>      
                            <span>Upload Mass Spectrometry Images (TIF/PNG/JPG)</span>   
                        </label>
                        <div id="upload-progress" class="progress-bar">
                            <div class="progress-fill"></div> 
                        </div>
                        <div id="upload-status" class="status"></div>
                    </div>
                </section>

                <!-- Color Bar Management -->
                <section class="section">
                    <h2>Color Bar Management</h2>
                    <div class="color-bar-controls">
                        <div class="form-group">
                            <label for="intensity-min">Minimum Intensity</label>
                            <input type="number" id="intensity-min" value="0" min="0">
                        </div>
                        <div class="form-group">
                            <label for="intensity-max">Maximum Intensity</label>
                            <input type="number" id="intensity-max" value="353515" min="0">
                        </div>
                        <div class="color-bar-preview">       
                            <img id="color-bar" class="color-bar" src="HotMetal2.jpg" alt="Color Reference Bar">
                        </div>
                        <div class="button-group">
                            <button id="save-color-scheme">Save Scheme</button>
                            <button id="load-color-scheme">Load Scheme</button>
                            <button id="upload-color-bar">Import Color Bar</button>
                        </div>
                        <input type="file" id="color-bar-file" accept="image/*" style="display: none;">
                    </div>
                </section>

                <!-- Image Navigation -->
                <section class="section" id="image-navigation" style="display: none;">
                    <h2>Image Navigation</h2>
                    <div class="image-nav-controls">
                        <button id="prev-image">Previous</button>
                        <span id="image-counter">1 / 1</span>
                        <button id="next-image">Next</button>
                    </div>
                    <div id="current-image-name" class="image-name"></div>
                </section>

                <!-- Analysis Controls -->
                <section class="section">
                    <h2>Analysis Controls</h2>
                    <div class="analysis-controls">
                        <button id="auto-analyze">Auto Analyze</button>
                        <div class="manual-selection-group">
                            <button id="manual-selection">Manual Selection</button>
                            <select id="selection-shape">
                                <option value="rectangle">Rectangle</option>
                                <option value="circle">Circle</option>
                                <option value="ellipse">Ellipse</option>
                            </select>
                        </div>
                        <button id="calculate-intensity">Calculate Intensity</button>
                        <button id="generate-summary">Generate Summary Table</button>
                        <button id="auto-generate-summary" class="auto-generate-btn">Auto Generate Summary Table</button>
                        <button id="export-results">Export CSV</button>
                        <button id="export-excel">Export Excel</button>
                        <button id="clear-all" class="clear-btn">Clear All</button>
                    </div>
                </section>

            </div>

            <!-- Right Side: Image Display and Results -->
            <div class="display-area">
                <!-- Image Display Area -->
                <div class="image-container">
                    <canvas id="image-canvas"></canvas>
                    <div id="intensity-labels"></div>
                </div>

                <!-- Results Display Area -->
                <div class="results-table">
                    <h2>Analysis Results</h2>
                    <table>
                        <thead>
                            <tr>
                                <th>Region</th>
                                <th>Total Intensity</th>
                                <th>Valid Pixels</th>
                                <th>Average Intensity</th>
                            </tr>
                        </thead>
                        <tbody id="results-body">
                            <!-- Results will be dynamically populated by JavaScript -->
                        </tbody>
                    </table>
                </div>

                <!-- Summary Table Area -->
                <div class="summary-table" style="display: none;">
                    <h2>Image Data Summary Analysis Results</h2>
                    <div class="summary-controls">
                        <button id="sort-regions">Sort Regions</button>
                        <button id="export-summary-csv">Export Summary CSV</button>
                        <button id="export-summary-excel">Export Summary Excel</button>
                    </div>
                    <div class="table-container">
                        <table id="summary-table">
                            <thead>
                                <tr id="summary-table-header">
                                    <!-- Header will be dynamically populated by JavaScript -->
                                </tr>
                            </thead>
                            <tbody id="summary-table-body">
                                <!-- Summary data will be dynamically populated by JavaScript -->
                            </tbody>
                        </table>
                    </div>
                </div>

            </div>
        </main>

        <footer>
            <p>© 2024 Mass Spectrometry Imaging Analysis System</p>
        </footer>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/tiff.js@1.0.0/tiff.min.js"></script>
    <script src="script.js"></script>
</body>
</html>
